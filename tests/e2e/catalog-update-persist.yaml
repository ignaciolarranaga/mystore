appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "product-form.create.submit"
    timeout: 15000
- tapOn:
    id: "product-form.create.name"
- inputText: "E2E Update Original Product"
- tapOn:
    id: "product-form.create.sku"
- inputText: "E2E-UPDATE-001"
- tapOn:
    id: "product-form.create.price"
- inputText: "21"
- tapOn:
    id: "product-form.create.stock"
- inputText: "3"
- tapOn:
    id: "product-form.create.submit"
- extendedWaitUntil:
    visible:
      text: "E2E Update Original Product"
    timeout: 15000
- tapOn:
    id: "product-item.E2E-UPDATE-001.edit"
- extendedWaitUntil:
    visible:
      id: "product-form.edit.submit"
    timeout: 10000
- tapOn:
    id: "product-form.edit.name"
- inputText: "E2E Update Persist Product"
- tapOn:
    id: "product-form.edit.price"
- inputText: "25.75"
- tapOn:
    id: "product-form.edit.stock"
- inputText: "9"
- tapOn:
    id: "product-form.edit.submit"
- extendedWaitUntil:
    visible:
      text: "E2E Update Persist Product"
    timeout: 15000
- assertNotVisible:
    text: "E2E Update Original Product"
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      text: "E2E Update Persist Product"
    timeout: 15000
- assertNotVisible:
    text: "E2E Update Original Product"
