appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "product-form.create.submit"
    timeout: 15000
- tapOn:
    id: "product-form.create.name"
- inputText: "E2E Delete Persist Product"
- tapOn:
    id: "product-form.create.sku"
- inputText: "E2E-DELETE-001"
- tapOn:
    id: "product-form.create.price"
- inputText: "8"
- tapOn:
    id: "product-form.create.stock"
- inputText: "2"
- tapOn:
    id: "product-form.create.submit"
- extendedWaitUntil:
    visible:
      text: "E2E Delete Persist Product"
    timeout: 15000
- tapOn:
    id: "product-item.E2E-DELETE-001.delete"
- extendedWaitUntil:
    notVisible:
      text: "E2E Delete Persist Product"
    timeout: 15000
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: "catalog.title"
    timeout: 15000
- assertNotVisible:
    text: "E2E Delete Persist Product"
